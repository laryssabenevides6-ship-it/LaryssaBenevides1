<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Central diaria de execucao para Residencia BR e USMLE Step 1." />
    <title>Med Study Brain | Execucao diaria</title>
    <link rel="stylesheet" href="./src/styles/app.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">MS</div>
          <div>
            <strong>Med Study Brain</strong>
            <span>Residencia + Step 1</span>
          </div>
        </div>
        <nav id="nav" class="nav"></nav>
        <div class="sidebar-footer">
          <button id="themeToggle" class="icon-button" type="button" title="Alternar tema">T</button>
          <div>
            <strong id="userMini">Conta</strong>
            <span>usuario conectado</span>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Central diaria de execucao</p>
            <h1 id="viewTitle">Hoje</h1>
          </div>
          <div class="topbar-actions">
            <div class="searchbox">
              <span>S</span>
              <input id="globalSearch" type="search" placeholder="Buscar aula, sistema, erro..." />
            </div>
            <button id="quickSessionBtn" class="primary-button" type="button">Registrar questoes feitas</button>
          </div>
        </header>

        <section id="alerts" class="alerts"></section>
        <section id="view" class="view"></section>
      </main>
    </div>

    <dialog id="modal" class="modal">
      <form method="dialog">
        <button class="modal-close" value="close" type="submit">x</button>
      </form>
      <div id="modalContent"></div>
    </dialog>

    <script type="module" src="./src/modules/app.js"></script>
  </body>
</html>
